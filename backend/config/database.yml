default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "password" } %>

development:
  primary:
    <<: *default
    database: recolly_development
  cache:
    <<: *default
    database: recolly_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: recolly_development_queue
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: recolly_test
  cache:
    <<: *default
    database: recolly_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: recolly_test_queue
    migrations_paths: db/queue_migrate

production:
  primary:
    <<: *default
    database: recolly_production
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *default
    database: recolly_production_cache
    url: <%= ENV.fetch("CACHE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: recolly_production_queue
    url: <%= ENV.fetch("QUEUE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/queue_migrate
