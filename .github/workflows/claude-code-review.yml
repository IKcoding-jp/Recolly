name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            このPRの差分をレビューしてください。

            ## レビュー対象（これだけ見る）
            1. バグ: 実行時エラー、ロジック誤り、nil/undefined参照、境界値の見落とし
            2. セキュリティ: SQLインジェクション、XSS、認証・認可の漏れ、Strong Parameters不備
            3. N+1クエリ: ActiveRecordの関連読み込み漏れ
            4. 重大な設計違反: controllerにビジネスロジックが直接書かれている等、明らかな責務違反のみ

            ## 重要なルール
            - 上記4項目に該当しない指摘はしない
            - 命名、フォーマット、コメント不足、DRY違反、リファクタ提案は一切指摘しない（lintとCI側で担保済み）
            - 「〜した方がよい」「〜も検討してください」レベルの提案は書かない
            - 指摘がゼロの場合は「LGTM」とだけ書く

            PRブランチは現在のワーキングディレクトリにチェックアウト済みです。
            レビュー結果は `gh pr comment` で1つのコメントにまとめて投稿してください。
            指摘がある場合はファイル名・行番号を含めてください。
            GitHubコメントのみ投稿し、メッセージとしてレビューテキストを返さないでください。
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
