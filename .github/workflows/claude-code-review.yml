name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            このPRをレビューしてください。CLAUDE.mdのレビュー観点に従ってください：

            - CLAUDE.md準拠: コーディング規約、命名規則、ファイルサイズ（200行以内）
            - コード品質: DRY / YAGNI原則、ベストプラクティス
            - バグ・セキュリティ: SQLインジェクション、XSS、認証漏れ、Strong Parameters
            - パフォーマンス: N+1クエリ、不要な再レンダリング、メモリリーク
            - 保守性・可読性: 変数名、コメント（「なぜ」の説明）、ファイル分割
            - テスト: カバレッジ、エッジケース、TDD遵守
            - 設計・アーキテクチャ: thin controller、コンポーネント設計、責務の分離

            PRブランチは現在のワーキングディレクトリにチェックアウト済みです。

            レビュー結果は `gh pr comment` で1つのコメントにまとめて投稿してください。
            ファイル名・行番号を含めて具体的に指摘してください。
            GitHubコメントのみ投稿し、メッセージとしてレビューテキストを返さないでください。
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
