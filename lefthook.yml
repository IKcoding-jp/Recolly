pre-commit:
  parallel: true
  commands:
    rubocop:
      root: backend/
      glob: "*.rb"
      run: docker compose exec -T backend bundle exec rubocop --force-exclusion {staged_files}
    eslint:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: docker compose exec -T frontend npx eslint {staged_files}
    prettier:
      root: frontend/
      glob: "*.{ts,tsx,css,json}"
      run: docker compose exec -T frontend npx prettier --check {staged_files}

# pre-push: CIで同じテストを実行しているため無効化（プッシュ高速化）
# 必要に応じて手動で実行: docker compose run --rm -e RAILS_ENV=test backend bundle exec rspec
# 必要に応じて手動で実行: docker compose run --rm frontend npm test
